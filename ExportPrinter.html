<!doctype html>
<html lang="en" class="h-100">
<head>

	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="Bitwarden Export Printer">
	<meta name="author" content="Caesar Kabalan and GitHub Contributors">
	<link rel="stylesheet" href="css/bootstrap/bootstrap.min.css">
	<meta name="theme-color" content="#7952b3">
	<link rel="stylesheet" href="css/main.css">
	<title>Bitwarden Export Printer</title>
</head>
<body class="d-flex h-100 text-center text-white bg-dark">
<div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">

			<div class="row mt-2">
				<div class="col-auto me-auto">
					<a href="#" class="link-light">Security Recommendations</a>
				</div>
				<div class="col-auto">
					<a href="#" class="link-light">Contribute</a>
				</div>
			</div>
		</div>
	</main>
</div>
<script src="js/jquery-3.6.0.slim.min.js"></script>
<script src="js/bootstrap/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>

</html>
